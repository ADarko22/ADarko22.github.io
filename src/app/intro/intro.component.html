
<div *ngIf="intro">
    <section>
        <h2>{{ intro.full_name }}</h2>
        <h3>{{ intro.profession }}</h3>
        <p [innerHTML]="sanitizeHtml(intro.summary)"></p>
        <p>Languages: {{ intro.languages }}</p>
        <p [innerHTML]="sanitizeHtml(intro.photos_intro)"></p>
        <photo-slideshow [photoUrls]="photoUrls"></photo-slideshow>
    </section>
</div>
