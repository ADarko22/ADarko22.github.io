<div *ngIf="educations" class="education-container">
    <section class="education-section">
        <h2 class="education-heading">Education</h2>
        <mat-accordion>
            <mat-expansion-panel *ngFor="let education of educations; let i = index; trackBy: trackByEducation" [expanded]="i === 0">
                <mat-expansion-panel-header>
                    <mat-panel-title>
                        <mat-icon class="education-icon">school</mat-icon> 
                        {{ education.degree }} from {{ education.institution }}
                    </mat-panel-title>
                    <mat-panel-description>
                        {{ education.graduation_year }} | {{ education.location }}
                    </mat-panel-description>
                </mat-expansion-panel-header>
                <div class="education-details">
                    <h5>Thesis:</h5>
                    <p [innerHTML]="sanitizeHtml(education.thesis)"></p>
                    <div *ngIf="education.publications && education.publications.length > 0">
                        <h5>Publications:</h5>
                        <mat-list>
                            <mat-list-item *ngFor="let publication of education.publications; trackBy: trackByPublication">
                                <a href={{publication.link}} target="_blank"> {{ publication.title }}</a>
                            </mat-list-item>
                        </mat-list>
                    </div>
                </div>
            </mat-expansion-panel>
        </mat-accordion>
    </section>
</div>
