<div *ngIf="contacts">
    <section>
        <h2>Contacts</h2>
        <p>Email: {{ contacts.email }}</p>
        <p>Phone: {{ contacts.phone }}</p>
        <p *ngIf="contacts.linkedin">LinkedIn: <a [href]="contacts.linkedin" target="_blank">{{ contacts.linkedin }}</a></p>
        <p *ngIf="contacts.github">GitHub: <a [href]="contacts.github" target="_blank">{{contacts.github }}</a></p>
    </section>
  </div>
