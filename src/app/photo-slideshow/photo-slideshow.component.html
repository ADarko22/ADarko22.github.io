<div class="slideshow-container" *ngIf="photoUrls && photoUrls.length > 0">
    <div *ngIf="isLoading" class="loading-spinner">
      <mat-spinner></mat-spinner>
    </div>
  
    <div class="photo-wrapper">
      <img *ngIf="photoUrls.length > 1 && prevPhotoUrl && !isLoading" [src]="prevPhotoUrl" class="side-photo prev-photo" alt="Previous Photo">
      <img *ngIf="currentPhoto && !isLoading" [src]="currentPhoto" class="slideshow-image" alt="Slideshow Image" (click)="openFullscreen()">
      <img *ngIf="photoUrls.length > 1 && nextPhotoUrl && !isLoading" [src]="nextPhotoUrl" class="side-photo next-photo" alt="Next Photo">
    </div>
  
    <button mat-icon-button class="prev" (click)="prevPhoto()" *ngIf="photoUrls.length > 1 && !isLoading">
      <mat-icon>chevron_left</mat-icon>
    </button>
    <button mat-icon-button class="next" (click)="nextPhoto()" *ngIf="photoUrls.length > 1 && !isLoading">
      <mat-icon>chevron_right</mat-icon>
    </button>
  </div>
  
  <div class="fullscreen-overlay" *ngIf="isFullscreen">
    <div class="fullscreen-image-container">
      <img [src]="currentPhoto" class="fullscreen-image" alt="Fullscreen Image">
      <button mat-icon-button class="close-fullscreen" (click)="closeFullscreen()">
        <mat-icon>close</mat-icon>
      </button>
    </div>
  </div>
